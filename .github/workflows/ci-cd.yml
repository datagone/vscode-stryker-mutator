name: CI-CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - alpha
    paths-ignore:
      - '.github/**'
      - '.husky/**'
      - '.vscode/**'
      - 'assets/**'
      - 'docs/**'
      - '*prettier*'
      - '.gitignore'
      - '.nvmrc'
      - '.yarnrc'
      - 'jest*'
      - 'lint-staged*'
      - 'stryker.conf.js'
jobs:
  build-test-pack:
    name: Build, Test and Pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: yarn

      - name: Install packages
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      # - name: Prettier
      #   run: yarn prettier:check

      - name: Unit tests
        run: yarn test:unit

      - name: Package the extension with webpack
        run: yarn package

      - name: Prepare the release version and product
        id: prepare
        run: yarn ci
        env:
          VSCE_TARGET: universal
          # All tokens are required since semantic-release needs to validate them
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          ## TODO In case you want to publish to OpenVSX
          # OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - uses: actions/upload-artifact@v3
        with:
          name: universal
          path: '*.vsix'

  release:
    name: Publish the VSIX
    runs-on: ubuntu-latest
    needs: build-test-pack
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm ci

      - uses: actions/download-artifact@v3

      - run: npx semantic-release --extends ./publish.release.config.js
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          ## TODO In case you want to publish to OpenVSX
          # OVSX_PAT: ${{ secrets.OVSX_PAT }}
